<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>OAK — redirecting</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <script>
      // GitHub Pages SPA redirect trick (Rafael Pedicini pattern).
      // index.html unwraps the encoded path on load.
      (function () {
        var l = window.location;
        var encoded =
          l.pathname.slice(1).replace(/&/g, "~and~") +
          (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
          l.hash;
        l.replace(l.protocol + "//" + l.host + "/?/" + encoded);
      })();
    </script>
  </head>
  <body>
    Redirecting…
  </body>
</html>
