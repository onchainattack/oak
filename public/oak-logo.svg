  <!-- mark: hexagon-chip with data-lines, matches favicon concept -->
  <g transform="translate(40 50)">
    <polygon points="84,0 130,32 130,90 84,122 38,90 38,32" fill="rgba(0,209,178,0.06)" stroke="#F2F4F7" stroke-width="6"/>
    <rect x="50" y="32" width="68" height="9" fill="#00D1B2"/>
