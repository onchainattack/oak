# OAK Coverage Manifest
#
# Maps third-party tools, services, and audit firms to the OAK Techniques
# they cover. The Technique edges are seeded from the `## Reference
# implementations` sections of techniques/*.md (via tools/extract_coverage.py)
# and refined by hand. Vendor metadata (name, URL, product, type) is curated.
#
# Coverage tiers:
#   full       — vendor explicitly claims and demonstrates coverage of this
#                Technique (detector ID, API field, audit-checklist item).
#   partial    — vendor surfaces a related signal but doesn't fully cover
#                the Technique surface (e.g. detects the on-chain artefact
#                but not the variant under proxy patterns).
#   documented — vendor is named in the Technique's Reference implementations
#                section but no explicit coverage word was given. Honest
#                placeholder pending hand-curation. Do not market as "full".
#   gap        — vendor explicitly notes the Technique is out of scope.
#   na         — Technique is structurally not applicable to this vendor's
#                product class (e.g. an EVM-only static analyzer vs a
#                Solana-only Technique).
#
# CI guard: tools/check_coverage.py re-runs the extractor and fails if any
# vendor mentioned in a Reference implementations section is missing from
# this manifest, or vice versa.

